name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: make check

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ vars.SERVICE }} \
            --source=. \
            --region=${{ vars.REGION }} \
            --project=${{ vars.GCP_PROJECT }} \
            --service-account=${{ vars.RUNTIME_SA }} \
            --allow-unauthenticated \
            --set-env-vars=GCS_BUCKET=${{ vars.GCS_BUCKET }},SCHEDULER_SA_EMAIL=${{ vars.SCHEDULER_SA }},REBUILD_AUDIENCE=${{ vars.REBUILD_AUDIENCE }} \
            --cpu=1 --memory=512Mi --max-instances=3 --min-instances=0

      # `gcloud run deploy` does not migrate traffic when the service has a
      # pinned (non-LATEST) traffic policy — which happens after any prior
      # `update-traffic --to-revisions` or PR-preview tag operation. Without
      # this step new revisions become Ready but receive 0% traffic, leaving
      # production silently stuck on an old image. Always rebind to LATEST.
      - name: Route 100% traffic to the new revision
        run: |
          gcloud run services update-traffic ${{ vars.SERVICE }} \
            --region=${{ vars.REGION }} \
            --project=${{ vars.GCP_PROJECT }} \
            --to-latest
